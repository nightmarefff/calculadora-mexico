<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Parceria</title>
    <style>
        body{ font-family: Arial; background:#111; color:white; display:flex; justify-content:center; align-items:center; height:100vh; margin: 0;}
        .box{ background:#1e1e1e; padding:30px; border-radius:10px; width:300px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);}
        label {display: block; margin-bottom: 5px; font-size: 14px; color: #ccc;}
        input{ width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box;}
        button{ width:100%; padding:12px; background:#7a00ff; border:none; border-radius: 5px; color:white; font-weight:bold; cursor:pointer; transition: background 0.3s;}
        button:hover {background: #6a00e0;}
        .result{ margin-top:20px; font-size:18px; font-weight: bold; text-align: center; padding: 10px; border-radius: 5px; background: #2a2a2a; display: none;}
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align: center; margin-bottom: 25px;">Calculadora de Parceria</h2>
        <label for="valor">Valor Total do Cliente</label>
        <input type="number" id="valor" placeholder="Ex: 1000">
        <label for="taxa">Taxa da Parceria (%)</label>
        <input type="number" id="taxa" placeholder="Ex: 10">
        <button onclick="calcular()">Calcular Retorno</button>
        <div class="result" id="resultado"></div>
    </div>
    <script>
        function calcular(){
            const valorInput = document.getElementById("valor");
            const taxaInput = document.getElementById("taxa");
            const resultadoDiv = document.getElementById("resultado");
            let valor = parseFloat(valorInput.value);
            let taxa = parseFloat(taxaInput.value);
            if (isNaN(valor) || isNaN(taxa)) {
                alert("Por favor, insira valores válidos.");
                return;}
            let taxaValor = valor * (taxa/100);
            let valorFinal = valor - taxaValor;
            resultadoDiv.style.display = "block";
            resultadoDiv.innerHTML = "Valor Líquido: R$ " + valorFinal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
    </script>
</body>
</html>
