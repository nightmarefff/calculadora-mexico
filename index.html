<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora México</title>
</head>
<body>
    <h1>Calculadora México</h1>
    <input type="text" id="valor" placeholder="Ex: 1000" oninput="formatarValor(this)">
    
    <script>
        function formatarValor(input) {
            let value = input.value.replace(/\D/g, '');
            input.value = value.replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
        }
    </script>
</body>
</html>
